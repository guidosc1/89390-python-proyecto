{% extends 'base.html' %}

{% block content %}

<h1>Iniciar sesión</h1>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Ingresar
    </button>

</form>

<p>
    ¿No tenés cuenta?

    <a href="{% url 'core:register' %}">
        Registrarse
    </a>
</p>

{% endblock %}
