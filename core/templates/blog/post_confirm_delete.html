{% extends 'base.html' %}

{% block content %}

<div class="form-container">

  <h1>Eliminar Post</h1>

  <div class="card">

    <p class="card-text">
      ¿Deseas eliminar "{{ post }}"?
    </p>

  </div>

  <form method="post">
    {% csrf_token %}

    <div class="actions">

      <button type="submit">
        Confirmar
      </button>

      <a href="{% url 'core:post_detail' post.pk %}">
        Cancelar
      </a>

    </div>

  </form>

</div>

{% endblock %}
