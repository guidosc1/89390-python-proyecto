{% extends 'base.html' %}

{% block content %}

<div class="card">

  <h1>{{ post.title }}</h1>

  <p class="card-text">{{ post.content }}</p>

  <div class="actions">

    <a href="{% url 'core:post_update' post.pk %}">
      Editar
    </a>

    <a href="{% url 'core:post_delete' post.pk %}">
      Eliminar
    </a>

    <a href="{% url 'core:post_list' %}">
      Volver
    </a>

  </div>

</div>

{% endblock %}
